<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch List | Tachikoma Pages</title>
    <link rel="icon" type="image/png" href="../assets/favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        .top-bar {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(245, 245, 245, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #e0e0e0;
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .top-bar a {
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .top-bar a:hover { color: #333; }

        .top-bar .sep {
            color: #ccc;
            font-size: 0.9rem;
        }

        .top-bar .current {
            font-size: 0.85rem;
            color: #333;
            font-weight: 500;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1.25rem;
            border: 1px solid #e0e0e0;
        }

        .card .embed {
            width: 100%;
            aspect-ratio: 16/9;
            border: none;
            border-radius: 8px;
            margin-bottom: 0.75rem;
        }

        .card .title {
            font-size: 1.1rem;
            line-height: 1.4;
            margin-bottom: 0.25rem;
        }

        .card .channel {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 0.5rem;
        }

        .card .summary {
            font-size: 0.9rem;
            line-height: 1.5;
            color: #555;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card .meta {
            font-size: 0.8rem;
            color: #999;
            margin-top: 0.5rem;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-top: 2rem;
            font-size: 0.9rem;
        }

        .pagination button {
            padding: 0.4rem 1rem;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            color: #555;
        }
        .pagination button:hover:not(:disabled) {
            background: #f5f5f5;
        }
        .pagination button:disabled {
            opacity: 0.4;
            cursor: default;
        }

        .empty {
            text-align: center;
            color: #999;
            padding: 3rem 0;
            font-style: italic;
        }

        .loading {
            text-align: center;
            color: #999;
            padding: 3rem 0;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="../">&larr; Home</a>
        <span class="sep">|</span>
        <span class="current">&#128250; Watch List</span>
        <span class="sep">|</span>
        <a href="archive/">Archive &rarr;</a>
    </div>

    <div class="container">
        <div id="cards" class="loading">Loading...</div>
        <div id="pagination" class="pagination"></div>
    </div>

    <script src="../assets/tachikoma.js?v=30d9ee3ddbc999ba"></script>
    <script>
        const PER_PAGE = 10;
        let data = null;
        let page = 0;

        async function load() {
            try {
                const res = await fetch('watch-data.json');
                data = await res.json();
            } catch (e) {
                document.getElementById('cards').innerHTML = '<div class="empty">Failed to load watch list.</div>';
                return;
            }
            render();
        }

        function render() {
            const queue = (data.queue || []).sort((a, b) => b.added.localeCompare(a.added));
            const totalPages = Math.ceil(queue.length / PER_PAGE);

            if (queue.length === 0) {
                document.getElementById('cards').innerHTML = '<div class="empty">No videos in queue.</div>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            const start = page * PER_PAGE;
            const end = start + PER_PAGE;
            const slice = queue.slice(start, end);

            let html = '';
            for (const item of slice) {
                const preview = item.summary ? item.summary.substring(0, 200) : '';
                html += `
                    <div class="card"
                         data-tachi-actions="watch" data-tachi-slug="${esc(item.slug)}">
                        <iframe class="embed" src="https://www.youtube.com/embed/${esc(item.video_id)}" allowfullscreen loading="lazy"></iframe>
                        <div class="title">${esc(item.title)}</div>
                        ${item.channel ? `<div class="channel">${esc(item.channel)}</div>` : ''}
                        ${preview ? `<div class="summary">${esc(preview)}</div>` : ''}
                        <div class="meta">Added ${item.added}</div>
                    </div>
                `;
            }
            document.getElementById('cards').innerHTML = html;
            Tachikoma.refresh();

            if (totalPages <= 1) {
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            document.getElementById('pagination').innerHTML = `
                <button onclick="go(${page - 1})" ${page === 0 ? 'disabled' : ''}>&larr; Prev</button>
                <span>Page ${page + 1} of ${totalPages}</span>
                <button onclick="go(${page + 1})" ${page >= totalPages - 1 ? 'disabled' : ''}>Next &rarr;</button>
            `;
        }

        function go(p) {
            page = p;
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }

        load();
    </script>
</body>
</html>
