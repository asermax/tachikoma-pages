<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Archive | Tachikoma Pages</title>
    <link rel="icon" type="image/png" href="../../assets/favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        .top-bar {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(245, 245, 245, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #e0e0e0;
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .top-bar a {
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .top-bar a:hover { color: #333; }

        .top-bar .sep {
            color: #ccc;
            font-size: 0.9rem;
        }

        .top-bar .current {
            font-size: 0.85rem;
            color: #333;
            font-weight: 500;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .row {
            display: flex;
            align-items: baseline;
            gap: 0.75rem;
            padding: 0.75rem 0;
            border-bottom: 1px solid #eee;
            background: white;
            padding-left: 1rem;
            padding-right: 1rem;
        }

        .row .title {
            flex: 1;
            min-width: 0;
        }
        .row .title a {
            color: #333;
            text-decoration: none;
            font-size: 0.95rem;
        }
        .row .title a:hover {
            color: #3498db;
            text-decoration: underline;
        }

        .row .channel {
            font-size: 0.8rem;
            color: #999;
            white-space: nowrap;
        }

        .row .notes-indicator {
            font-size: 0.85rem;
            color: #aaa;
        }

        .row .date {
            font-size: 0.8rem;
            color: #999;
            white-space: nowrap;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-top: 2rem;
            font-size: 0.9rem;
        }

        .pagination button {
            padding: 0.4rem 1rem;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            color: #555;
        }
        .pagination button:hover:not(:disabled) {
            background: #f5f5f5;
        }
        .pagination button:disabled {
            opacity: 0.4;
            cursor: default;
        }

        .empty {
            text-align: center;
            color: #999;
            padding: 3rem 0;
            font-style: italic;
        }

        .loading {
            text-align: center;
            color: #999;
            padding: 3rem 0;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="../../">&larr; Home</a>
        <span class="sep">|</span>
        <span class="current">&#128250; Archive</span>
        <span class="sep">|</span>
        <a href="../">&larr; Back to Queue</a>
    </div>

    <div class="container">
        <div id="list" class="loading">Loading...</div>
        <div id="pagination" class="pagination"></div>
    </div>

    <script>
        const PER_PAGE = 10;
        let data = null;
        let page = 0;

        async function load() {
            try {
                const res = await fetch('../watch-data.json');
                data = await res.json();
            } catch (e) {
                document.getElementById('list').innerHTML = '<div class="empty">Failed to load archive.</div>';
                return;
            }
            render();
        }

        function render() {
            const archive = data.archive || [];
            const totalPages = Math.ceil(archive.length / PER_PAGE);

            if (archive.length === 0) {
                document.getElementById('list').innerHTML = '<div class="empty">No archived videos.</div>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            const start = page * PER_PAGE;
            const end = start + PER_PAGE;
            const slice = archive.slice(start, end);

            let html = '';
            for (const item of slice) {
                html += `
                    <div class="row">
                        <div class="title"><a href="${esc(item.url)}" target="_blank" rel="noopener">${esc(item.title)}</a></div>
                        ${item.channel ? `<span class="channel">${esc(item.channel)}</span>` : ''}
                        ${item.has_notes ? '<span class="notes-indicator">&#128221;</span>' : ''}
                        <span class="date">${item.watched || ''}</span>
                    </div>
                `;
            }
            document.getElementById('list').innerHTML = html;

            if (totalPages <= 1) {
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            document.getElementById('pagination').innerHTML = `
                <button onclick="go(${page - 1})" ${page === 0 ? 'disabled' : ''}>&larr; Prev</button>
                <span>Page ${page + 1} of ${totalPages}</span>
                <button onclick="go(${page + 1})" ${page >= totalPages - 1 ? 'disabled' : ''}>Next &rarr;</button>
            `;
        }

        function go(p) {
            page = p;
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }

        load();
    </script>
</body>
</html>
