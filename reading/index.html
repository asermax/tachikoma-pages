<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading List | Tachikoma Pages</title>
    <link rel="icon" type="image/png" href="../assets/favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Georgia, 'Times New Roman', serif;
            background: #faf9f6;
            color: #2c3e50;
        }

        .top-bar {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(250, 249, 246, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #e8e6e1;
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .top-bar a {
            color: #666;
            text-decoration: none;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 0.9rem;
        }
        .top-bar a:hover { color: #2c3e50; }

        .top-bar .sep {
            color: #ccc;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 0.9rem;
        }

        .top-bar .current {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 0.85rem;
            color: #2c3e50;
            font-weight: 500;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .card {
            display: block;
            background: white;
            border-radius: 10px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1rem;
            border: 1px solid #e8e6e1;
            transition: box-shadow 0.2s;
            text-decoration: none;
            color: inherit;
        }
        .card:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .card .title {
            font-size: 1.15rem;
            line-height: 1.4;
            margin-bottom: 0.5rem;
            color: #1a1a1a;
        }
        .card:hover .title {
            color: #5a3e28;
        }

        .card .category {
            display: inline-block;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #8b5a2b;
            background: rgba(139, 90, 43, 0.1);
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            margin-bottom: 0.5rem;
        }

        .card .summary {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #555;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card .meta {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 0.8rem;
            color: #999;
            margin-top: 0.5rem;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.75rem;
            padding: 0.25rem 0;
        }
        .toolbar-top { margin-bottom: 0.75rem; }
        .toolbar-bottom { margin-top: 0.75rem; }

        .toolbar select {
            padding: 0.35rem 0.5rem;
            border: 1px solid #e8e6e1;
            background: white;
            border-radius: 6px;
            color: #555;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 0.85rem;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 0.85rem;
            color: #888;
        }

        .pagination button {
            padding: 0.35rem 0.75rem;
            border: 1px solid #e8e6e1;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            color: #555;
            font-size: 0.85rem;
        }
        .pagination button:hover:not(:disabled) {
            background: #f5f5f5;
        }
        .pagination button:disabled {
            opacity: 0.4;
            cursor: default;
        }

        .pagination select {
            padding: 0.35rem 0.5rem;
            border: 1px solid #e8e6e1;
            background: white;
            border-radius: 6px;
            color: #555;
            font-size: 0.85rem;
        }

        .empty {
            text-align: center;
            color: #999;
            padding: 3rem 0;
            font-style: italic;
        }

        .loading {
            text-align: center;
            color: #999;
            padding: 3rem 0;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="../">&larr; Home</a>
        <span class="sep">|</span>
        <span class="current">&#128214; Reading List</span>
        <span class="sep">|</span>
        <a href="archive/">Archive &rarr;</a>
    </div>

    <div class="container">
        <div id="toolbar-top"></div>
        <div id="cards" class="loading">Loading...</div>
        <div id="toolbar-bottom"></div>
    </div>

    <script src="../assets/tachikoma.js?v=4e37b477ab801357"></script>
    <script>
        const PER_PAGE = 10;
        let data = null;
        let page = 0;
        let sortOrder = 'newest';

        function parseState() {
            const p = new URLSearchParams(location.search);
            sortOrder = p.get('sort') || 'newest';
            page = Math.max(0, parseInt(p.get('page') || '0', 10) - 1);
        }

        function pushState() {
            const p = new URLSearchParams();
            if (sortOrder !== 'newest') p.set('sort', sortOrder);
            if (page > 0) p.set('page', page + 1);
            const qs = p.toString();
            history.replaceState(null, '', qs ? '?' + qs : location.pathname);
        }

        parseState();

        async function load() {
            try {
                const res = await fetch('reading-data.json');
                data = await res.json();
            } catch (e) {
                document.getElementById('cards').innerHTML = '<div class="empty">Failed to load reading list.</div>';
                return;
            }
            render();
        }

        function render() {
            pushState();
            const queue = (data.queue || []).sort((a, b) =>
                sortOrder === 'newest'
                    ? b.added.localeCompare(a.added)
                    : a.added.localeCompare(b.added)
            );
            const totalPages = Math.ceil(queue.length / PER_PAGE);

            const toolbarHtml = (pos) => {
                if (queue.length === 0) return '';
                return `
                <div class="toolbar toolbar-${pos}">
                    ${totalPages > 1 ? `
                    <div class="pagination">
                        <button onclick="go(${page - 1})" ${page === 0 ? 'disabled' : ''}>&larr; Prev</button>
                        <select onchange="go(parseInt(this.value)-1);">
                            ${Array.from({length: totalPages}, (_, i) =>
                                `<option value="${i + 1}" ${page === i ? 'selected' : ''}>${i + 1} of ${totalPages}</option>`
                            ).join('')}
                        </select>
                        <button onclick="go(${page + 1})" ${page >= totalPages - 1 ? 'disabled' : ''}>Next &rarr;</button>
                    </div>` : ''}
                    <select onchange="sortOrder=this.value;page=0;render();">
                        <option value="newest" ${sortOrder === 'newest' ? 'selected' : ''}>Newest</option>
                        <option value="oldest" ${sortOrder === 'oldest' ? 'selected' : ''}>Oldest</option>
                    </select>
                </div>`;
            };

            if (queue.length === 0) {
                document.getElementById('cards').innerHTML = '<div class="empty">No articles in queue.</div>';
                document.getElementById('toolbar-top').innerHTML = '';
                document.getElementById('toolbar-bottom').innerHTML = '';
                return;
            }

            const start = page * PER_PAGE;
            const end = start + PER_PAGE;
            const slice = queue.slice(start, end);

            let html = '';
            for (const item of slice) {
                const preview = item.summary ? item.summary.substring(0, 200) : '';
                html += `
                    <a class="card" href="${esc(item.url)}" target="_blank" rel="noopener"
                       data-tachi-actions="reading" data-tachi-slug="${esc(item.slug)}">
                        <span class="category">${esc(item.category)}</span>
                        <div class="title">${esc(item.title)}</div>
                        ${preview ? `<div class="summary">${esc(preview)}</div>` : ''}
                        <div class="meta">Added ${item.added}</div>
                    </a>
                `;
            }
            document.getElementById('cards').innerHTML = html;
            Tachikoma.refresh();
            document.getElementById('toolbar-top').innerHTML = toolbarHtml('top');
            document.getElementById('toolbar-bottom').innerHTML = toolbarHtml('bottom');
        }

        function go(p) {
            page = p;
            pushState();
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }

        load();
    </script>
</body>
</html>
