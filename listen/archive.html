<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive | Listen | Tachikoma Pages</title>
    <link rel="icon" type="image/png" href="../assets/favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Georgia, 'Times New Roman', serif;
            background: #faf9f6;
            color: #2c3e50;
        }
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(250, 249, 246, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #e8e6e1;
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .top-bar a {
            color: #666;
            text-decoration: none;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 0.9rem;
        }
        .top-bar a:hover { color: #2c3e50; }
        .top-bar .title {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 0.85rem;
            color: #999;
            margin-left: auto;
        }
        #content {
            max-width: 680px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }
        #content h2 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: #1a1a1a;
        }
        .archive-item {
            display: block;
            padding: 1.25rem;
            background: #fff;
            border-radius: 8px;
            margin-bottom: 1rem;
            text-decoration: none;
            color: inherit;
            border: 1px solid #eee;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .archive-item:hover {
            border-color: #e94560;
            box-shadow: 0 2px 8px rgba(233, 69, 96, 0.1);
        }
        .archive-item h3 {
            font-size: 1.15rem;
            margin-bottom: 0.25rem;
            color: #2c3e50;
        }
        .archive-item .archive-meta {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 0.85rem;
            color: #999;
        }
        .archive-item .saved-badge {
            display: inline-block;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 0.7rem;
            color: #e94560;
            background: rgba(233, 69, 96, 0.08);
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
            margin-left: 0.5rem;
            vertical-align: middle;
        }
    </style>
</head>
<body>
<div class="top-bar">
    <a href="..">&larr; Home</a>
    <a href="./">Latest</a>
    <span class="title">Archive</span>
</div>
<div id="content">
    <h2>Articles</h2>
    <div id="archiveList"></div>
</div>
<script>
const ARTICLES = [
    { slug: 'gas-town', title: 'Gas Town: from Clown Show to v1.0', meta: 'Steve Yegge \u00b7 April 2026' },
    { slug: 'resonant-computing', title: 'Resonant Computing', meta: 'Resonant Computing Collective \u00b7 March 2026' }
];

const archiveList = document.getElementById('archiveList');

ARTICLES.forEach(a => {
    const div = document.createElement('div');
    div.className = 'archive-item';

    const saved = localStorage.getItem('listen_' + a.slug);
    const badge = saved && parseFloat(saved) > 1
        ? ' <span class="saved-badge">In progress</span>'
        : '';

    div.innerHTML = `<h3>${a.title}${badge}</h3><div class="archive-meta">${a.meta}</div>`;
    div.addEventListener('click', () => {
        window.location.href = `./?article=${a.slug}`;
    });
    archiveList.appendChild(div);
});
</script>
</body>
</html>
